<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Akaya Serenity — Launching</title>
  <link rel="icon" href="assets/images/favicon.png" />
  <style>
    html,body{height:100%;margin:0}
    .video-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
    video{width:100%;height:100%;object-fit:cover}
    .overlay{position:fixed;left:0;right:0;top:0;padding:18px;text-align:center;color:#fff;font-family:Inter,Arial,sans-serif}
    .launch-text{font-weight:700;letter-spacing:2px}
  </style>
</head>
<body>
  <div class="video-wrap">
    <video id="launchVideo" autoplay muted playsinline loop poster="assets/images/hero-stream-lodge.png">
      <!-- Video file (case-sensitive on many hosts) -->
      <source src="assets/videos/akaya-launch.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
    <button id="playBtn" class="play-btn" aria-label="Play with sound">▶</button>
  <script>
    // Try to play; many browsers require user gesture for unmuted playback, but muted autoplay should work.
    document.addEventListener('DOMContentLoaded', function(){
      var v = document.getElementById('launchVideo');
      if (v && v.paused) v.play().catch(function(){ /* ignore */ });
      var btn = document.getElementById('playBtn');
      if (btn && v) {
        btn.addEventListener('click', function () {
          v.muted = false;
          v.play().catch(function(){});
          btn.classList.add('hidden');
        });
        // If user taps video area directly on some devices, also unmute
        v.addEventListener('click', function () {
          if (v.muted) {
            v.muted = false;
            v.play().catch(function(){});
            if (btn) btn.classList.add('hidden');
          }
        });
      }
    });
  </script>
</body>
</html>
