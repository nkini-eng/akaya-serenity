<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Akaya Serenity</title>
  <link rel="icon" href="assets/images/favicon.png" />
  <style>
    html,body{height:100%;margin:0}
    body{display:flex;align-items:center;justify-content:center;background:#000}
    img{max-width:100%;height:auto;display:block}
    .wrap{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:#000}
    /* Coming soon ticker */
    .coming-soon{position:fixed;left:0;right:0;bottom:0;height:52px;display:flex;align-items:center;overflow:hidden;background:rgba(0,0,0,0.6);z-index:10}
    .coming-soon.top{top:0;bottom:auto}
    .coming-soon .ticker{display:inline-block;white-space:nowrap;will-change:transform;animation:slide 10s linear infinite}
    .coming-soon .ticker span{display:inline-block;color:#fff;font-weight:900;padding:0 40px;letter-spacing:4px;font-size:clamp(22px,6vw,56px)}
    /* Single span animates continuously from left to right */
    @keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
    @media (prefers-reduced-motion: reduce){
      .coming-soon .ticker{animation:none}
    }
  </style>
</head>
<body>
  <div class="coming-soon top" aria-hidden="true">
    <div class="ticker">
      <span>#COMING SOON</span>
    </div>
  </div>
  <div class="wrap">
    <img src="assets/images/akaya-launch.png" alt="Akaya Serenity" />
  </div>
  <div class="coming-soon" aria-hidden="true">
    <div class="ticker">
      <span>#COMING SOON</span>
    </div>
  </div>
</body>
</html>
<!DOCTYPE html>
